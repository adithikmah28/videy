<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #player-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .instructions {
            text-align: center;
            padding: 20px;
        }
        code {
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    
    <div id="player-container">
        <!-- Iframe akan dimasukkan di sini oleh JavaScript -->
        <div class="instructions">
            <h1>Video Player</h1>
            <p>ID video tidak ditemukan.</p>
            <p>Gunakan format: <code>?v=ID_VIDEO_DARI_VIDEY</code> di akhir URL.</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
